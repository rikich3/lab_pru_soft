<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestor de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h2> Mi Inventario </h2>
                </div>
                <div class="card-body">
                    <h4 th:text="${producto.nombre} + ' (Cód: ' + ${producto.codigo} + ')'">Producto</h4>
                    <p class="fs-5"><strong>Precio:</strong> $<span th:text="${producto.precio}"></span></p>
                    <p class="fs-5"><strong>Stock Actual:</strong> 
                        <span class="badge bg-success fs-6" th:text="${producto.consultarStock()}"></span>
                    </p>
                    <p class="fs-5"><strong>Valor Total:</strong> $<span th:text="${producto.obtenerValorTotal()}"></span></p>

                    <hr>
                    <form th:action="@{/inventario/agregar}" method="post" class="d-flex gap-2">
                        <input type="number" name="cantidad" class="form-control" placeholder="Cant. a agregar" required min="1">
                        <button type="submit" class="btn btn-success">➕ Agregar Stock</button>
                    </form>

                    <hr>
                    <h5>Historial de Movimientos</h5>
                    <ul class="list-group">
                        <li class="list-group-item" th:each="mov : ${producto.getMovimientos()}">
                            <span th:text="${mov.tipo == 'ENTRADA' ? '🟢 ENTRADA' : '🔴 SALIDA'}"></span>
                            - Cantidad: <b th:text="${mov.cantidad}"></b> 
                            <small class="text-muted float-end" th:text="${mov.fechaHora}"></small>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
